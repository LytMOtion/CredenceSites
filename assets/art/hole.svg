<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-label="Architectural plan of a single coastal golf hole with tee, fairway, bunkers and green">
  <defs>
    <linearGradient id="fw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FA089"/>
      <stop offset="1" stop-color="#728672"/>
    </linearGradient>
  </defs>
  <!-- ocean edge -->
  <path d="M0 0 L900 0 L900 120 C 720 150 560 128 360 168 C 200 200 90 184 0 214 Z" fill="#AFC0C1" opacity="0.5"/>
  <path d="M0 214 C 90 184 200 200 360 168 C 560 128 720 150 900 120" fill="none" stroke="#FBFBF8" stroke-width="1.4" opacity="0.6"/>
  <!-- fairway corridor -->
  <path d="M120 486 C 260 430 300 380 420 356 C 560 328 600 280 700 214" fill="none" stroke="url(#fw)" stroke-width="82" stroke-linecap="round" opacity="0.55"/>
  <!-- centre line -->
  <path d="M120 486 C 260 430 300 380 420 356 C 560 328 600 280 700 214" fill="none" stroke="#3F5347" stroke-width="1.3" stroke-dasharray="2 10" opacity="0.8"/>
  <!-- tee -->
  <rect x="102" y="480" width="34" height="18" rx="3" fill="#5E7264"/>
  <text x="119" y="524" font-family="Manrope, sans-serif" font-size="15" fill="#4C5F52" text-anchor="middle">Tee</text>
  <!-- bunkers -->
  <path d="M330 400 q 46 -30 92 -6 q -6 30 -50 28 q -46 -2 -42 -22 Z" fill="#D8C7A6"/>
  <path d="M330 400 q 46 -30 92 -6 q -6 30 -50 28 q -46 -2 -42 -22 Z" fill="none" stroke="#B9A57F" stroke-width="1.2"/>
  <path d="M600 260 q 40 -26 78 -4 q -6 26 -44 24 q -38 -2 -34 -20 Z" fill="#D8C7A6"/>
  <path d="M600 260 q 40 -26 78 -4 q -6 26 -44 24 q -38 -2 -34 -20 Z" fill="none" stroke="#B9A57F" stroke-width="1.2"/>
  <!-- green -->
  <ellipse cx="700" cy="214" rx="52" ry="38" fill="#8FA089"/>
  <ellipse cx="700" cy="214" rx="52" ry="38" fill="none" stroke="#54685A" stroke-width="1.4"/>
  <g transform="translate(710 206)">
    <line x1="0" y1="0" x2="0" y2="-46" stroke="#42504A" stroke-width="1.8"/>
    <path d="M0 -46 L 26 -39 L 0 -32 Z" fill="#BC7A48"/>
    <circle cx="0" cy="0" r="3" fill="#42504A"/>
  </g>
</svg>
